<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>π-Day 2026</title>
    
    <style>
        /* Estilo base para a obra de arte interativa */
        body {
            background-color: #000000;
            color: #d1d1d1;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Evita barras de rolagem desnecessárias */
        }

        /* O container principal da obra */
        .artwork-container {
            width: 90vw;
            height: 90vh;
            max-width: 1200px;
            max-height: 800px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        /* Navegação entre as 3 representações */
        .representation-nav {
            display: flex;
            border-bottom: 1px solid #333;
        }

        .tab-button {
            background: none;
            border: none;
            border-right: 1px solid #333;
            color: #888;
            padding: 15px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-button:last-child {
            border-right: none;
        }

        .tab-button:hover {
            background-color: #1a1a1a;
            color: #fff;
        }

        .tab-button.active {
            background-color: #222;
            color: #fff;
            font-weight: bold;
        }

        /* Área de conteúdo onde cada representação aparecerá */
        .representation-content {
            flex-grow: 1;
            position: relative;
        }

        .content-pane {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
        }

        .content-pane.active {
            opacity: 1;
            visibility: visible;
        }

        /* Estilo para a imagem da constelação */
        #constellation-pane img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* Placeholder para as outras representações */
        .placeholder-text {
            font-size: 1.2em;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="artwork-container">
        <!-- Navegação por Abas -->
        <nav class="representation-nav">
            <button class="tab-button active" onclick="showPane('constellation')">[ I. A Constelação ]</button>
            <button class="tab-button" onclick="showPane('map')">[ II. O Mapa ]</button>
            <button class="tab-button" onclick="showPane('simulator')">[ III. O Simulador ]</button>
        </nav>

        <!-- Conteúdo das Representações -->
        <div class="representation-content">
            <!-- Painel 1: A Constelação (Artístico) -->
            <div id="constellation-pane" class="content-pane active">
                <!-- A imagem da constelação será inserida aqui -->
                <img src="constelacao_pi.jpg" alt="Constelação fictícia baseada nos dígitos de Pi.">
            </div>

            <!-- Painel 2: O Mapa (Técnico) -->
            <div id="map-pane" class="content-pane">
                <!-- O diagrama de rede ou a árvore de diretórios interativa irá aqui -->
                <p class="placeholder-text">Representação II: O Mapa de Navegação (em construção)</p>
            </div>

            <!-- Painel 3: O Simulador (Filosófico) -->
            <div id="simulator-pane" class="content-pane">
                <!-- A simulação da Cascata de Sobrecarga irá aqui -->
                <p class="placeholder-text">Representação III: O Simulador da Cascata (em construção)</p>
            </div>
        </div>
    </div>

    <script>
        function showPane(paneId) {
            // Esconde todos os painéis de conteúdo
            const panes = document.querySelectorAll('.content-pane');
            panes.forEach(pane => {
                pane.classList.remove('active');
            });

            // Desativa todos os botões
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(button => {
                button.classList.remove('active');
            });

            // Mostra o painel selecionado
            document.getElementById(paneId + '-pane').classList.add('active');

            // Ativa o botão correspondente
            document.querySelector(`[onclick="showPane('${paneId}')"]`).classList.add('active');
        }
    </script>

</body>
</html>
