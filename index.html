<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wagnerpyter.ia.br</title>
    
    <style>
        /* Estilo Padrão 'Filosofia' adaptado para um portal de índice */
        body {
            background-color: #FFFFFF;
            color: #000000;
            font-family: 'Times New Roman', Times, serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        /* Container para o conteúdo */
        .container {
            max-width: 600px;
            padding: 20px;
            position: relative;
        }

        /* Estilo do Portal de Entrada */
        #gateway {
            display: block;
        }

        .enter-btn {
            background: #fff;
            border: 1px solid #000;
            color: #000;
            padding: 12px 30px;
            font-size: 1.2em;
            font-family: 'Times New Roman', Times, serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .enter-btn:hover {
            background-color: #000;
            color: #fff;
        }

        /* Estilo do Menu Principal */
        #main-menu {
            display: none;
        }

        h1 {
            font-family: 'Arial', Helvetica, sans-serif;
            font-weight: normal;
            font-size: 1.8em;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .menu-list {
            list-style-type: none;
            padding: 0;
            text-align: left;
        }

        .menu-list li {
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .menu-list a {
            color: #0000FF;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
        }

        .menu-list a:hover {
            text-decoration: underline;
        }

        .pi-code {
            font-family: 'Courier New', Courier, monospace;
            color: #555;
        }

        /* Rodapé com links para subdomínios */
        .footer-links {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 0 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            color: #888;
            letter-spacing: 0.05em;
            pointer-events: none;
        }

        .footer-links a {
            color: #7B2D8B;
            text-decoration: none;
            pointer-events: auto;
            transition: color 0.2s ease;
            padding: 4px 8px;
        }

        .footer-links a:hover {
            color: #0000FF;
            text-decoration: underline;
            background: #f5f5f5;
            border-radius: 4px;
        }

        .separator {
            color: #ccc;
            pointer-events: none;
        }

        @media (max-width: 500px) {
            .footer-links {
                flex-wrap: wrap;
                gap: 10px;
                bottom: 10px;
            }
            .separator {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Portal de Entrada -->
        <div id="gateway">

                <li><a href="4.html"><span class="page-name">Torrent</span><span class="pi-code">3.14159</span></a></li>
                <li><a href="5.html"><span class="page-name">Certificados</span><span class="pi-code">3.141592</span></a></li>

            </ul>

    </div>

    <!-- Rodapé com links para subdomínios -->
    <div class="footer-links">
        <a href="http://piday.wagnerpyter.ia.br" target="_blank">π day 🥧</a>
        <span class="separator">//</span>
        <a href="http://metro.wagnerpyter.ia.br" target="_blank">metrô 🚇</a>
    </div>

    <script>
        function enterSite() {
            document.getElementById('gateway').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
        }
    </script>

</body>
